    #       DbType: sqlserver
    #       DbPort: 1433
    #       DbName: somedb
    #       DbHost: somesqlserver.database.windows.net
    #       User: someuser
    #       Password: *****
    dataloaders:
        loadTranslations:
            folder: data/translations
