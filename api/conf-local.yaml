# this is the base configuration, which can be used as is for local development;
# our dev server (Tilt) transforms it into a configmap which must be "Kustomized"
# for the remote environments: sandbox, staging, production
Common:
    env: local
    http:
        port: 55555
        apiPath: /rest
    # databases:
