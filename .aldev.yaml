# ============================================================= #
# Configuration file about how we're developing the app called: #
# ============================================================= #
appname: DevotionProjectTemplate

languages: fr,de

api:
    # the config for the development of the API
    srcdir: api
    bindir: ../bin
    i18n:
        links:
            - https://sheets.googleapis.com/v4/spreadsheets/13wVHCo7x0bu4Gdtn5rEvr5OsddVEK0rzVpBbqESTpqE/values/goaldn?key=AIzaSyAFb8qAmo3Wva5cjCg5f-gQ8tNDF6D7QzE
        keysize: 48
        folder: translations
    datadir: data
    watchalso:
        - ../../open/goald
        - some_custom_project_path
    #localinstances: 3
    localport: 42042
    # the actual configuration for the API's runtime
    runtimes:
        # what's common to all the environments
        common:
            base:
                # databases:
                #     - DbID: main
                #       DbType: sqlserver
                #       DbPort: 1433
                #       DbName: somedb
                #       DbHost: somesqlserver.database.windows.net
                #       User: someuser
                #       Password: *****
                dataloaders:
                    loadTranslations:
                        folder: data/translations
            custom:
                message: "Hello World!"
                submodule:
                    somethreshold: 10

        # this env always exists, and has envtype = LOCAL; other possible values: SANDBOX, STAGING, PRODUCTION
        local:
            custom:
                message: "This is the local app!"
                submodule:
                    somethreshold: 50
        remote:
            dev:
                base:
                    envtype: SANDBOX
                custom:
                    message: "This is the local app!"
                    submodule:
                        somethreshold: 100
            qua:
                base:
                    envtype: STAGING
            prd:
                base:
                    envtype: PRODUCTION

deploying:
    dir: deploy
    cicd: gitlab
    platform: azure
    global:
        resource_ns: ???
        location: ???
        identity_sub_name: ???
        management_sub_name: ???
        acr_name: ???
        acr_rg: ???
        domain_name: ???
        oauth2_scope_guid: ???
        port: 55555
    environments:
        dev:
            environment_sub_name: ???
        qua:
            environment_sub_name: ???
        prd:
            environment_sub_name: ???

