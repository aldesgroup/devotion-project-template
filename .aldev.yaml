codeswaps:
    - from: "api"
      for: ["*.mod"]
      do:
          - replace: "// replace github.com/aldesgroup/goald => ../../../open/goald"
            with: "replace github.com/aldesgroup/goald => ../../../open/goald"
            eofcom: true
          - replace: "// replace github.com/aldesgroup/corego => ../../../open/corego"
            with: "replace github.com/aldesgroup/corego => ../../../open/corego"
            eofcom: true

